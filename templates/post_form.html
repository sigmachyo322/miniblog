{% extends 'base.html' %}
{% block title %}{% if post %}Редактировать{% else %}Новая статья{% endif %} — MiniBlog{% endblock %}
{% block content %}
<div class="form-page">
  <h1>{% if post %}Редактировать статью{% else %}Новая статья{% endif %}</h1>
  <form method="POST">
    <div class="form-group">
      <label for="title">Заголовок</label>
      <input type="text" id="title" name="title" required maxlength="200"
             value="{{ post.title if post else '' }}" placeholder="Введите заголовок…"/>
    </div>
    <div class="form-group">
      <label for="body">Текст статьи</label>
      <textarea id="body" name="body" required rows="12"
                placeholder="Напишите что-нибудь интересное…">{{ post.body if post else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{% if post %}Сохранить{% else %}Опубликовать{% endif %}</button>
      <a href="{{ url_for('index') }}" class="btn btn-outline">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
